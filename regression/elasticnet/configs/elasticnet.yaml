# ElasticNet regression configuration
# Grid search: 13 alphas x 6 l1_ratios = 78 combinations

name: elasticnet

params:
  # L1/L2 mixing parameter (0=Ridge, 1=Lasso)
  l1_ratio:
    - 0.1
    - 0.5
    - 0.7
    - 0.9
    - 0.95
    - 0.99

  # Alpha values (regularization strength, log scale)
  alphas:
    - 0.0001
    - 0.0005
    - 0.001
    - 0.005
    - 0.01
    - 0.05
    - 0.1
    - 0.5
    - 1.0
    - 5.0
    - 10.0
    - 50.0
    - 100.0

  # Optimization
  max_iter: 10000
